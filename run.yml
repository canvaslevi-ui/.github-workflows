name: Python Bot

on:
  schedule:
    - cron: "*/10 * * * *"   # har 10 minute run
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Libraries
        run: |
          pip install requests

      - name: Run Script
        run: |
          python bot.py
          
          - name: Install PHP
  run: sudo apt install php -y

- name: Run script
  run: php bot.php
